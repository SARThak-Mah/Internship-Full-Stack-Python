<html>
  <head>
    <title>Rowspan Example</title>
  </head>
  <body>
    <table
      border="1"
      cellspacing="0"
      cellpadding="20"
      align="center"
      bgcolor="blue"
      bordercolor="black"
    >
      <tr>
        <td rowspan="3" align="center">Column 1</td>
        <td align="center" width="200">Row 1</td>
      </tr>

      <tr>
        <td align="center">Row 2</td>
      </tr>

      <tr>
        <td align="center">Row 3</td>
      </tr>
    </table>
  </body>
</html>
