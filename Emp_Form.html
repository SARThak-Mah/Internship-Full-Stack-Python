<!doctype html>
<html>
  <head>
    <title>Insert Data Form</title>
  </head>
  <body>
    <h1>INSERT DATA FORM</h1>

    <form>
      <table>
        <tr>
          <th>Employee ID:</th>
          <td><input type="text" name="EmpId" size="5" /></td>
        </tr>
        <tr>
          <th>First Name</th>
          <td><input type="text" name="fname" /></td>
        </tr>
        <tr>
          <th>Last Name</th>
          <td><input type="text" name="lname" /></td>
        </tr>
        <tr>
          <th>Department NUMBER</th>
          <td><input type="text" name="Number" size="5" /></td>
        </tr>
        <tr>
          <th>Start Date</th>
          <td><input type="text" name="date" size="7" /></td>
        </tr>
        <tr>
          <th>Salary</th>
          <td><input type="text" name="sal" size="6" /></td>
        </tr>
        <tr>
          <th>Contractor</th>
          <td><input type="checkbox" name="contractor" value="Yes" /></td>
        </tr>
        <tr>
          <th colspan="2">
            <input type="submit" name="name" value="Submit" />
            <input type="reset" value="Clear Form" name="clear" />
          </th>
        </tr>
      </table>
    </form>
  </body>
</html>
