<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crud</title>
</head>
<body>
    <h1>{{ msg }}</h1>

    <form method="get" action="/myapp/crud-data/">
        Eid: <input type="text" name="eid"><br><br>
        <input type="submit" name="sub" value="display">
        <input type="submit" name="sub" value="delete">
    </form>

    <hr>

    {% if data %}
    <table border="1" width="500">
        <tr>
            <th>Eid</th>
            <th>Ename</th>
            <th>Eloc</th>
            <th>Esal</th>
        </tr>
        <tr>
            <td>{{ data.eid }}</td>
            <td>{{ data.ename }}</td>
            <td>{{ data.eloc }}</td>
            <td>{{ data.esal }}</td>
        </tr>
    </table>
    {% endif %}
</body>
</html>
