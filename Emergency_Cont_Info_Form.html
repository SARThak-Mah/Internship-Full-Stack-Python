<!doctype html>
<html>
  <head>
    <title>Emergency Contact Info</title>
    <link rel="stylesheet" href="Style_9.css" />
  </head>
  <body>
    <div class="box">
      <div class="bar">
        <span>Emergency Contact Info</span><span>More Actions ▼</span>
      </div>
      <form>
        <div class="grid">
          <div>
            <div class="row">
              <label>First Name</label><input type="text" />
            </div>
            <div class="row"><label>Last Name</label><input type="text" /></div>
            <div class="row">
              <label>Gender</label
              ><select>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
            <div class="row">
              <label>Date of Birth</label><input type="text" />
            </div>
            <div class="title">Medical Information</div>
            <div class="row">
              <label>Hospital Pref.</label><input type="text" />
            </div>
            <div class="row">
              <label>Insurance Co.</label><input type="text" />
            </div>
            <div class="row">
              <label>Policy Number</label><input type="text" />
            </div>
            <div class="row">
              <label>Physician Name</label><input type="text" />
            </div>
            <div class="row">
              <label>Phone Number</label><input type="text" />
            </div>
            <div class="row"><label>Allergies</label><textarea></textarea></div>
          </div>
          <div>
            <div class="title" style="margin-top: 0">
              Emergency Contact Info
            </div>
            <div class="row"><label>Name</label><input type="text" /></div>
            <div class="row">
              <label>Relationship</label><input type="text" />
            </div>
            <div class="row">
              <label>Address</label><textarea style="height: 110px"></textarea>
            </div>
            <div class="row"><label>City</label><input type="text" /></div>
            <div class="row">
              <label>State</label
              ><select>
                <option>-Select-</option>
              </select>
            </div>
            <div class="row">
              <label>Country</label
              ><select>
                <option>-Select-</option>
              </select>
            </div>
            <div class="row">
              <label>Home Phone</label><input type="text" />
            </div>
            <div class="row">
              <label>Work Phone</label><input type="text" />
            </div>
          </div>
        </div>
        <div class="footer">
          <button type="submit" class="btn">Submit</button>
          <button type="reset" class="btn">Reset</button>
        </div>
      </form>
    </div>
  </body>
</html>
